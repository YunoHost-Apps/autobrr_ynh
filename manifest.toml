#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.72.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false

sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.72.0/autobrr_1.72.0_linux_x86_64.tar.gz"
    amd64.sha256 = "c16236451380bbdd7b9437fdbdc71baf65c5a82e4f23d83a269b62b1d074aee8"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.72.0/autobrr_1.72.0_linux_arm64.tar.gz"
    arm64.sha256 = "f795a6885094f959cd7d612d845cd41a2614dd7f7500bf48f9cd38dbcba116a2"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.72.0/autobrr_1.72.0_linux_arm.tar.gz"
    armhf.sha256 = "6d7b8816560b2879f08139bdced8f0a8f53c995c8db48bbc3987f5fd3d332ed3"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
