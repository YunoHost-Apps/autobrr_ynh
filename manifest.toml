#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.79.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.79.0/autobrr_1.79.0_linux_x86_64.tar.gz"
    amd64.sha256 = "a62f45cc2e2cb038f2ffcf6530ee717bcdd4fe09e643303f4f856548152b76de"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.79.0/autobrr_1.79.0_linux_arm64.tar.gz"
    arm64.sha256 = "8c9cb373593e40ea66c3412db6acd3c89961362e6df43fa3cbe677007179f6a9"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.79.0/autobrr_1.79.0_linux_arm.tar.gz"
    armhf.sha256 = "3a8f7608f41c7568675c0eb90392075ab285c65073ea2d60ed7b8b831abdc8a4"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
