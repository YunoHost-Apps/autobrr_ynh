#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.75.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.75.1/autobrr_1.75.1_linux_x86_64.tar.gz"
    amd64.sha256 = "716705975a2a26203ed9846a3f7ef2ae0b51cb76e82e7c412e4370c1cb1f19cb"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.75.1/autobrr_1.75.1_linux_arm64.tar.gz"
    arm64.sha256 = "9ba3fcd0884c417859f6da1ca842ccb2d789c50fd250a4564f8050276970017b"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.75.1/autobrr_1.75.1_linux_arm.tar.gz"
    armhf.sha256 = "4e833d175db7ff0ef2fb435aa542526b935652d0712ea3e8891d7f0f8ff24433"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
