#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.72.1~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.72.1/autobrr_1.72.1_linux_x86_64.tar.gz"
    amd64.sha256 = "bde0638a601ade229516856beefaa833c11cf04c7b4763f7d4e7ad41f91fe9ff"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.72.1/autobrr_1.72.1_linux_arm64.tar.gz"
    arm64.sha256 = "b3c46372ec78bb70969bcb9fd4c8ee0de7847e624884c627dbb3e7292b14fb1f"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.72.1/autobrr_1.72.1_linux_arm.tar.gz"
    armhf.sha256 = "7fef9aecf0cbee13103af934f05174c8a7782a60850a2f954570f09d84455c91"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
