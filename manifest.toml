#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.78.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.78.0/autobrr_1.78.0_linux_x86_64.tar.gz"
    amd64.sha256 = "723198dec63edcc7253acdf550fb85a5f72e6fb9797a3d1aa554d6369e281889"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.78.0/autobrr_1.78.0_linux_arm64.tar.gz"
    arm64.sha256 = "ce1d79aa9a90ab8bf6ce3ed48c0a02a3cc74b8359ce29a444396222ef9179805"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.78.0/autobrr_1.78.0_linux_arm.tar.gz"
    armhf.sha256 = "98f0e90e3a8da56c74240874fc4646016aff76895326c3b959ca9b72d94bda29"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
