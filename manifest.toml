#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.73.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.73.0/autobrr_1.73.0_linux_x86_64.tar.gz"
    amd64.sha256 = "97ea4d625cbe24bdb9531e6ed84e33e437f79a0338cbd3a897ba227464547a76"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.73.0/autobrr_1.73.0_linux_arm64.tar.gz"
    arm64.sha256 = "d5ff32c49e580075d55a0026b0ba4245cd8b47de93afa7f900d5208b99f92e3b"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.73.0/autobrr_1.73.0_linux_arm.tar.gz"
    armhf.sha256 = "a52782225d95d5c390cdf110b03f7eb0fa7b116d50c03e6981b81ae22f96c818"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
