#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.74.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.74.0/autobrr_1.74.0_linux_x86_64.tar.gz"
    amd64.sha256 = "d899c16e8fdada03397d06e547f9757401c197ba5dadb02a93271ca9c1001726"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.74.0/autobrr_1.74.0_linux_arm64.tar.gz"
    arm64.sha256 = "fbb7378a621a9f96ddacac438dd7a63b6a7ab8637963e290678f7c5c7469811b"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.74.0/autobrr_1.74.0_linux_arm.tar.gz"
    armhf.sha256 = "bc2b9ec28308668426966982cf07e8d3475138753bd81fa0b9b4dd911fe1f6d3"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
