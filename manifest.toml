#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "autobrr"
name = "Autobrr"
description.en = "Modern, easy to use download automation for torrents and usenet"
description.fr = "Automatisation de téléchargement pour les torrents et Usenet"

version = "1.77.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0-only"
website = "https://autobrr.com/"
code = "https://github.com/autobrr/autobrr"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "150M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/autobrr"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.sources]

    [resources.sources.main]
    amd64.url = "https://github.com/autobrr/autobrr/releases/download/v1.77.0/autobrr_1.77.0_linux_x86_64.tar.gz"
    amd64.sha256 = "effa0d005389ff363ee2462b083100e8e82574c24987ce7d134f404707b3c62a"
    arm64.url = "https://github.com/autobrr/autobrr/releases/download/v1.77.0/autobrr_1.77.0_linux_arm64.tar.gz"
    arm64.sha256 = "463f8c4a432e39efad7442cdbd8296b0a5c9717bc6546ff76388bbdffc00293a"
    armhf.url = "https://github.com/autobrr/autobrr/releases/download/v1.77.0/autobrr_1.77.0_linux_arm.tar.gz"
    armhf.sha256 = "7f2e99e49bfef266a8769a9072654d8cc16f8e9b842e4e3841a3ab4deda56400"
    in_subdir = false
    extract = true
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset.amd64 = "^autobrr_.*_linux_x86_64.tar.gz$"
    autoupdate.asset.arm64 = "^autobrr_.*_linux_arm64.tar.gz$"
    autoupdate.asset.armhf = "^autobrr_.*_linux_(arm|armv6).tar.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.ports]

    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
